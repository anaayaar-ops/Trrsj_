name: XO Bot Runner

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest # سنستخدم أحدث نظام متاح

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x' # تحديث الإصدار إلى 20 لحل تعارض المكتبات

      - name: Install dependencies
        run: |
          npm install --no-audit --no-fund
          # إذا كانت هناك مشكلة في wrtc ولم تكن تستخدمها فعلياً، يفضل حذفها
        
      - name: Run Bot
        env:
          U_MAIL: ${{ secrets.U_MAIL }}
          U_PASS: ${{ secrets.U_PASS }}
        run: node index.js
